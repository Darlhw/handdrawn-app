name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v "$PWD":/home/user/hostcwd \
          kivy/buildozer:latest \
          android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: handdrawn-apk
        path: bin/*.apk
